<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Your BackRow verification code</title>
  </head>
  <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:#f5f5f5;margin:0;padding:20px;">
    <div style="max-width:560px;margin:0 auto;background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e5e5e5;">
      <div style="background-color:#1a1a1a;padding:20px 24px;">
        <img src="https://backrow.tv/api/brand/wordmark" alt="BackRow" width="150" height="40" style="display:block;height:40px;width:auto;border:0;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;" />
      </div>
      <div style="padding:28px 24px;">
        <h1 style="margin:0 0 12px;color:#1a1a1a;font-size:22px;font-weight:600;line-height:1.3;">Your verification code</h1>
        <p style="margin:0 0 24px;color:#333;font-size:15px;line-height:1.6;">Use this code to confirm it&rsquo;s you. It expires in a few minutes.</p>
        <div style="text-align:center;margin:28px 0;">
          <span style="display:inline-block;color:#1a1a1a;font-size:30px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:0.25em;background-color:#f5f5f5;padding:16px 28px;border-radius:10px;border:1px solid #e5e5e5;">{{ .Token }}</span>
        </div>
        <p style="margin:0;color:#999;font-size:12px;line-height:1.6;">If you didn&rsquo;t request this code, you can ignore this email and your account stays secure.</p>
      </div>
      <div style="border-top:1px solid #e5e5e5;padding:16px 24px;background-color:#fafafa;">
        <p style="color:#999;font-size:12px;margin:0;line-height:1.5;">Sent by BackRow. <a href="{{ .SiteURL }}" style="color:#6B9B6B;text-decoration:underline;">backrow.tv</a></p>
      </div>
    </div>
  </body>
</html>
