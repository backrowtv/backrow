<!--
  BackRow themed base template for Supabase Auth emails.
  Every Supabase auth template shares this structure — only the content block
  changes. Palette mirrors `src/lib/email/templates/components/backrow-layout.tsx`:
    primary:        #6B9B6B (sage-green)
    header bg:      #1a1a1a
    body bg:        #f5f5f5
    container bg:   #ffffff
    border:         #e5e5e5
    text primary:   #1a1a1a
    text muted:     #666
  560px max-width container. Righteous wordmark via Google Fonts CDN (falls
  back to Arial for any client that blocks web fonts).

  Supabase template variables that can appear in the content block:
    {{ .ConfirmationURL }}   Full URL with token, ready for an <a href>
    {{ .Token }}              6-digit OTP (for copy-paste flows)
    {{ .TokenHash }}          Hashed token (rarely needed)
    {{ .SiteURL }}            Configured site URL
    {{ .Email }}              Recipient
    {{ .NewEmail }}           New email (change-email template only)
    {{ .Data }}               User metadata JSON

  Each sibling file in this folder is a full, pasteable HTML document for the
  matching Supabase dashboard template. Do not use this file directly.
-->
