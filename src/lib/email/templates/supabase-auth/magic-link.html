<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Your BackRow sign-in link</title>
  </head>
  <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:#f5f5f5;margin:0;padding:20px;">
    <div style="max-width:560px;margin:0 auto;background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e5e5e5;">
      <div style="background-color:#1a1a1a;padding:20px 24px;">
        <img src="https://backrow.tv/api/brand/wordmark?v=2" alt="BackRow" width="150" height="40" style="display:block;height:40px;width:auto;border:0;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;" />
      </div>
      <div style="padding:28px 24px;">
        <h1 style="margin:0 0 12px;color:#1a1a1a;font-size:22px;font-weight:600;line-height:1.3;">Sign in to BackRow</h1>
        <p style="margin:0 0 24px;color:#333;font-size:15px;line-height:1.6;">Tap the button below to sign in. This link is good for one use and expires shortly.</p>
        <div style="text-align:center;margin:28px 0;">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#6B9B6B;color:#ffffff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;">Sign in</a>
        </div>
        <p style="margin:0 0 8px;color:#666;font-size:13px;line-height:1.6;">Or copy-paste this one-time code:</p>
        <p style="margin:0 0 24px;color:#1a1a1a;font-size:18px;font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:0.15em;background-color:#f5f5f5;padding:10px 14px;border-radius:6px;display:inline-block;">{{ .Token }}</p>
        <p style="margin:0;color:#999;font-size:12px;line-height:1.6;">If you didn&rsquo;t request this sign-in link, you can safely ignore this email.</p>
      </div>
      <div style="border-top:1px solid #e5e5e5;padding:16px 24px;background-color:#fafafa;">
        <p style="color:#999;font-size:12px;margin:0;line-height:1.5;">Sent by BackRow. <a href="{{ .SiteURL }}" style="color:#6B9B6B;text-decoration:underline;">backrow.tv</a></p>
      </div>
    </div>
  </body>
</html>
